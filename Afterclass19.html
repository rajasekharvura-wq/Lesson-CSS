<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>JavaScript While Loops</h2>
    <p id="number"></p>

    <script>
        let text = "";
        let i = 0;

        while (i < 4) {
            let randomNumber = Math.floor(Math.random() * 56);
            text += "<br>The random number is " + randomNumber;
            i++;
        }

        document.getElementById("number").innerHTML = text;
    </script>
</body>
</html>
