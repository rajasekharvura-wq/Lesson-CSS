<!DOCTYPE html>
<html>
    <head>
        <title>Lucky Draw</title>
        <style>
            body{
                font-family:Arial,sans-serif;
                background:aliceblue;
                text-align:center;
                padding:30px

            }
            h1{
                color:navy

            }
            input{
                padding:8px;
                margin:5px;
                border:2px solid navy;
                border-radius:6px;
                width:220px;
            } 
            button{
                background:navy;
                color:white;
                padding:10px 20px;
                border: none;
                border-radius:20px;
                cursor:pointer;
            }
            #timer{
                color:grey;
            }
            </style>
    </head>
    <body>
        <h1>Lucky Draw</h1>
        <p>Enter your name and guess a number to win</p>
        <input type="text" id="name" placeholder="Your Name" required><br>
        <p id="msg-name"></p>
        <input type="number" id="guess" placeholder="Guess a number (1-5)" min="1" max="5"><br>
        <p id="msg-guess"></p>
        <button onclick="checkForm()">Try My Luck</button>
        <p id="result"></p>
        <p id="timer"></p>
        <script>
            var seconds=0;
            setInterval(function() {
                seconds=seconds+1;
                document.getElementById("timer").textContent="You have been here for " + seconds + " seconds.";
            },1000);
            function checkForm(){
                var name=document.getElementById("name").value;
                var guess=document.getElementById("guess").value;
                var ok=true;
                if(name==""){
                    document.getElementById("msg-name").textContent="Please enter your name.";
                    document.getElementById("msg-name").style.color="red";
                    ok=false;
                } else {
                    document.getElementById("msg-name").textContent="Great Name!";
                    document.getElementById("msg-name").style.color="green";
                }
                if(guess==""){
                    document.getElementById("msg-guess").textContent="Please enter your guess.";
                    document.getElementById("msg-guess").style.color="red";
                    ok=false;
                }else{
                    document.getElementById("msg-guess").textContent="Good Guess!";
                    document.getElementById("msg-guess").style.color="green";
                }
                if (ok==true){
                    var lucky=Math.floor(Math.random()*5)+1;
                    if (guess==lucky){
                        document.getElementById("result").textContent="You Win!" +name +" The Lucky Number was " +lucky;
                        document.getElementById("result").style.color="green";
                    } else {
                        document.getElementById("result").textContent="So close " +name +" The Lucky Number was " +lucky;
                        document.getElementById("result").style.color="navy";
                    }
                }
            }
        </script>
    </body>
    </html>
