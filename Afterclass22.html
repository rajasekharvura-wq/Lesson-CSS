<!DOCTYPE html>

<html>
<head>
  <title>Error Handling in JavaScript</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }
input {
  padding: 10px;
  font-size: 16px;
}

button {
  padding: 10px 15px;
  font-size: 16px;
  margin-left: 10px;
  cursor: pointer;
}

#output {
  margin-top: 20px;
  font-size: 18px;
  font-weight: bold;
}

.error {
  color: red;
}

.success {
  color: green;
}
  </style>
</head>
<body>

  <h2>JavaScript Error Handling Demo</h2>

  <input type="text" id="userInput" placeholder="Enter a number">
  <button onclick="runCheck()">Check</button>

  <p id="output"></p>

  <script>
    function runCheck() {
      let value = document.getElementById("userInput").value;
      let output = document.getElementById("output");

      try {
        // Check if input is empty or not a number
        if (value === "" || isNaN(value)) {
          throw new Error("Invalid input! Please enter a valid number.");
        }

        // If valid
        output.className = "success";
        output.innerText = "✅ Valid number: " + value;

      } catch (error) {
        // Handle error
        output.className = "error";
        output.innerText = "❌ Error: " + error.message;
      }
    }
  </script>

</body>
</html>
